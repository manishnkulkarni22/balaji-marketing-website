<h2>Admin Login</h2>

<form (submit)="login()">
  <input
    type="email"
    placeholder="Email"
    [(ngModel)]="email"
    name="email"
    required
  />

  <input
    type="password"
    placeholder="Password"
    [(ngModel)]="password"
    name="password"
    required
  />

  <button type="submit">Login</button>
</form>
